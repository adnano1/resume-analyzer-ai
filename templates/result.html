<!DOCTYPE html>
<html>

<head>

<title>Resume Analysis Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
padding-top:60px;
font-family:Arial;
}

.card{
border-radius:15px;
}

.score{
font-size:50px;
font-weight:bold;
color:#2c5364;
}

.skillbox{
background:#f1f3f8;
padding:15px;
border-radius:10px;
min-height:120px;
}

.footer{
margin-top:30px;
text-align:center;
color:#666;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card p-4 shadow">

<h3 class="text-center">Resume Analysis Result</h3>

<hr>

<div class="text-center mb-4">

<div class="score">{{score}}%</div>
<p class="text-muted">Job Match Score</p>

</div>

<div class="row text-center">

<div class="col-md-4">

<h5>Resume Skills</h5>

<div class="skillbox">
{{resume_skills}}
</div>

</div>

<div class="col-md-4">

<h5>Job Skills</h5>

<div class="skillbox">
{{job_skills}}
</div>

</div>

<div class="col-md-4">

<h5>Matched Skills</h5>

<div class="skillbox">
{{matched}}
</div>

</div>

</div>

<div class="text-center mt-4">

<a href="/" class="btn btn-primary btn-lg">
Analyze Another Resume
</a>

</div>

</div>

<div class="footer">
Project Made by <strong>Adnan Hashmi</strong>
</div>

</div>

</div>

</div>

</body>
</html>
